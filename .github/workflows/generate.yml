name: Generate & Deploy Signatures

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate all signatures
        run: python3 generate.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/assets _site/signatures
          cp -r signatures/*.html _site/signatures/
          cp -r assets/* _site/assets/ 2>/dev/null || true
          cp install.sh _site/install.sh
          echo '<meta http-equiv="refresh" content="0;url=signatures/">' > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
